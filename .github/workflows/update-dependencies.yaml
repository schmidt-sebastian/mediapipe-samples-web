name: Daily Dependency Update

on:
  schedule:
    # Run at 00:00 every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'

      - name: Install dependencies
        run: npm ci


      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Update dependencies
        run: npm update --save


      - name: Run E2E Tests
        timeout-minutes: 10
        run: npm run test

      - name: Create Pull Request
        if: success() # Only create PR if tests pass
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update all dependencies to latest"
          title: "Automated Dependency Updates"
          body: |
            Automated dependency updates triggered by daily GitHub Action schedule.192.
          branch: "chore/auto-update-dependencies"
          delete-branch: true
          base: "main"
