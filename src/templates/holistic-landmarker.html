<div class="model-settings-control">
  <div id="status-message" class="status-msg">Initializing...</div>
  <div id="inference-time" class="status-msg">Inference Time: 0ms</div>
  
  <div class="tabs">
    <div class="tab active" id="tab-model-list">Pre-trained Models</div>
    <div class="tab" id="tab-model-upload" style="display: none;">Upload Model</div>
  </div>

  <div class="tab-content">
    <div id="view-model-list" class="active">
      <div class="control-group">
        <label>
          Model Selection
          <select id="model-select">
            <option value="holistic_landmarker_lite" selected>Holistic Landmarker (Lite)</option>
            <option value="holistic_landmarker_full">Holistic Landmarker (Full)</option>
            <option value="holistic_landmarker_heavy">Holistic Landmarker (Heavy)</option>
          </select>
        </label>
      </div>
    </div>
  </div>

  <div class="control-group">
    <label>
      Delegate
      <select id="delegate-select">
        <option value="GPU">GPU</option>
        <option value="CPU">CPU</option>
      </select>
    </label>
  </div>
  
  <!-- Add more sliders if needed (minFaceDetectionConfidence etc.), keeping it simple for now -->
</div>

<div class="image-mode-control">
  <div class="tabs">
    <div class="tab active" id="tab-image">Image</div>
    <div class="tab" id="tab-webcam">Webcam</div>
  </div>

  <div class="view-content">
    <div id="view-image" class="active">
      <div class="upload-dropzone">
        <div class="dropzone-content">
          <span class="icon">📁</span>
          <span>Drag & Drop or Click to Upload</span>
        </div>
        <input type="file" id="image-upload" accept="image/*">
      </div>
      <div id="image-preview-container" class="preview-container">
        <img id="test-image" src="pose_model.png" crossorigin="anonymous" />
        <canvas id="image-canvas"></canvas>
      </div>
    </div>
    <div id="view-webcam" class="webcam-container">
      <div class="cam-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
      </div>
      <button id="webcamButton" class="action-btn" disabled>Enable Webcam</button>
    </div>
  </div>
</div>
